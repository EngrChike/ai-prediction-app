<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI MASTER PREDICT | DonChike Engineering</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .accent-gradient { background: linear-gradient(135deg, #22c55e 0%, #3b82f6 100%); }
    </style>
</head>
<body class="p-4 sm:p-6 lg:p-10">

    <header class="max-w-5xl mx-auto mb-10 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <div>
            <h1 class="text-4xl font-black tracking-tighter text-white uppercase">AI MASTER <span class="text-green-500">PREDICT</span></h1>
            <p class="text-gray-500 font-medium text-sm italic">High-Intensity Analysis Engine v3.0</p>
        </div>
        <div class="flex items-center gap-3 bg-green-500/10 border border-green-500/20 px-4 py-2 rounded-full">
            <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
            <span class="text-xs font-bold text-green-400 uppercase">Server Active (2026)</span>
        </div>
    </header>

    <main class="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="lg:col-span-1 space-y-6">
            <div class="glass p-6 rounded-3xl border-t-4 border-blue-500">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-bold text-lg"><i class="fa-solid fa-sun text-yellow-400 mr-2"></i>Morning 5-Odds</h2>
                    <span id="update-tag" class="text-[9px] text-gray-500 font-bold">LOADING...</span>
                </div>
                <div id="morning-odds" class="space-y-4">
                    <p class="text-xs text-gray-600 animate-pulse">Syncing matches...</p>
                </div>
            </div>

            <div class="glass p-6 rounded-3xl border-t-4 border-indigo-500 opacity-90">
                <h2 class="font-bold text-lg mb-4"><i class="fa-solid fa-moon text-indigo-400 mr-2"></i>Evening 5-Odds</h2>
                <div class="text-center py-6 border-2 border-dashed border-white/5 rounded-2xl">
                    <i class="fa-solid fa-lock text-gray-700 text-2xl mb-2"></i>
                    <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Unlocks at 16:00 GMT</p>
                </div>
            </div>
        </div>

        <div class="lg:col-span-2">
            <section class="glass p-8 rounded-3xl border-t-4 border-green-500">
                <h2 class="text-2xl font-bold text-white mb-6 flex items-center">
                    <i class="fa-solid fa-layer-group text-green-500 mr-3"></i>10-Day Master Ticket
                </h2>
                <div id="master-list" class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <p class="text-gray-600 text-sm italic col-span-2 text-center py-10">AI is selecting the safest daily picks...</p>
                </div>
                <div class="mt-8 pt-6 border-t border-white/10 flex justify-between items-center">
                    <p id="total-odds" class="text-3xl font-black text-green-500">0.00</p>
                    <button class="accent-gradient text-white font-bold py-3 px-8 rounded-2xl shadow-lg">COPY TICKET</button>
                </div>
            </section>

            <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mt-6 text-center">
                <div class="glass p-4 rounded-2xl"><p class="text-[10px] text-gray-500 font-bold uppercase">Accuracy</p><p id="winrate" class="text-xl font-black">0%</p></div>
                <div class="glass p-4 rounded-2xl"><p class="text-[10px] text-gray-500 font-bold uppercase">Wins</p><p id="wins" class="text-xl font-black text-green-400">0</p></div>
                <div class="glass p-4 rounded-2xl"><p class="text-[10px] text-gray-500 font-bold uppercase">Losses</p><p id="losses" class="text-xl font-black text-red-400">0</p></div>
                <div class="glass p-4 rounded-2xl"><p class="text-[10px] text-gray-500 font-bold uppercase">Streak</p><p id="streak" class="text-xl font-black text-blue-400">0W</p></div>
            </div>
        </div>
    </main>

    <script>
        async function updateUI() {
            const cache = `?v=${new Date().getTime()}`;
            try {
                // Fetch Accumulator
                const tRes = await fetch('tracker.json' + cache);
                const tData = await tRes.json();
                const list = document.getElementById('master-list');
                const master = tData.master_ticket || [];

                if (master.length > 0) {
                    list.innerHTML = '';
                    master.forEach(game => {
                        list.innerHTML += `
                            <div class="bg-white/5 p-4 rounded-xl border border-white/5 flex justify-between items-center">
                                <div>
                                    <p class="text-[10px] text-gray-500 font-bold uppercase">${game.day} • ${game.date}</p>
                                    <p class="text-sm font-bold text-white">${game.match}</p>
                                </div>
                                <span class="bg-green-500 text-slate-900 text-[10px] font-black px-2 py-1 rounded">OVER 2.5</span>
                            </div>`;
                    });
                    document.getElementById('total-odds').innerText = "~ 61.40";
                }

                // Fetch Stats & Morning Slip
                const hRes = await fetch('history.json' + cache);
                const hData = await hRes.json();
                document.getElementById('winrate').innerText = hData.win_rate || "0%";
                document.getElementById('wins').innerText = hData.total_wins || "0";
                document.getElementById('losses').innerText = hData.total_losses || "0";
                document.getElementById('streak').innerText = hData.current_streak || "0W";
                document.getElementById('update-tag').innerText = "UPDATED: " + (hData.last_update || "NOW");

                const morning = document.getElementById('morning-odds');
                if (hData.morning_5_odds && hData.morning_5_odds.length > 0) {
                    morning.innerHTML = hData.morning_5_odds.map(g => `
                        <div class="flex justify-between text-xs border-b border-white/5 pb-2">
                            <span>${g.match}</span>
                            <span class="text-green-400 font-bold">${g.tip}</span>
                        </div>`).join('');
                }
            } catch (err) { console.log("Engine warming up..."); }
        }
        window.onload = updateUI;
    </script>
</body>
</html>

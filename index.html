<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Don Chike Elite - Goal Intensity Analysis</title>
    <style>
        :root {
            --primary: #004d40;
            --accent: #ffc107;
            --win-bg: #d4edda;
            --win-text: #155724;
            --loss-bg: #f8d7da;
            --loss-text: #721c24;
            --pending-bg: #e2e3e5;
            --pending-text: #383d41;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        header { background: var(--primary); color: white; padding: 20px; text-align: center; border-radius: 8px; margin-bottom: 20px; }
        
        .container { max-width: 1200px; margin: auto; }
        .section-title { border-left: 5px solid var(--accent); padding-left: 15px; margin: 30px 0 15px; color: var(--primary); }

        /* Odds & Roadmap Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }

        /* Status Badges */
        .status-badge { display: inline-block; padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 0.75em; margin-top: 5px; }
        .win { background: var(--win-bg); color: var(--win-text); border: 1px solid #c3e6cb; }
        .loss { background: var(--loss-bg); color: var(--loss-text); border: 1px solid #f5c6cb; }
        .pending { background: var(--pending-bg); color: var(--pending-text); border: 1px solid #d6d8db; }

        .intensity { color: #555; font-size: 0.85em; font-weight: 600; }
        .day-label { color: var(--accent); font-weight: bold; font-size: 1.1em; display: block; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .match-text { font-size: 1em; font-weight: bold; color: #333; margin: 8px 0 4px; }
        
        /* New Game Row Style */
        .game-row { border-bottom: 1px dashed #ddd; padding-bottom: 10px; margin-bottom: 10px; }
        .game-row:last-child { border-bottom: none; }
        
        footer { text-align: center; margin-top: 50px; padding: 20px; color: #777; border-top: 1px solid #ddd; }
    </style>
</head>
<body>

<header>
    <h1>DON CHIKE ELITE ANALYSIS</h1>
    <p>Data-Driven Football Intensity Scouting</p>
</header>

<div class="container">
    
    <h2 class="section-title">Daily High-Intensity Selections</h2>
    <div class="grid">
        <div class="card">
            <h3>Morning 5-Odds Pool</h3>
            <div id="morning-list">Loading Daily Audit...</div>
        </div>
        <div class="card">
            <h3>Evening 5-Odds Pool</h3>
            <div id="evening-list">Loading Daily Audit...</div>
        </div>
    </div>

    <h2 class="section-title">5-Day Intensive Sprint Roadmap</h2>
    <div class="grid" id="roadmap-list">
        </div>

</div>

<footer>
    <p>&copy; 2026 AkuDon Global. Predictive AI Verification Active.</p>
    <p id="last-update">Last Update: --:--</p>
</footer>

<script>
    const DAILY_URL = 'history.json';
    const ROADMAP_URL = 'tracker.json';

    async function fetchData() {
        try {
            // Load Daily Picks
            const dailyRes = await fetch(DAILY_URL + '?v=' + Date.now());
            const dailyData = await dailyRes.json();
            document.getElementById('last-update').innerText = `Last AI Audit: ${dailyData.last_update}`;
            
            // Note: If you stop using morning/evening lists in main.py, 
            // these will show the "No games" message.
            renderDaily(dailyData.morning_5_odds, 'morning-list');
            renderDaily(dailyData.evening_5_odds, 'evening-list');

            // Load 5-Day Roadmap
            const roadmapRes = await fetch(ROADMAP_URL + '?v=' + Date.now());
            const roadmapData = await roadmapRes.json();
            renderRoadmap(roadmapData.master_ticket);

        } catch (error) {
            console.error("Error loading analysis data:", error);
        }
    }

    function getStatusClass(status) {
        if (!status) return "pending";
        if (status.includes("✅")) return "win";
        if (status.includes("❌")) return "loss";
        return "pending";
    }

    function renderDaily(games, elementId) {
        const container = document.getElementById(elementId);
        if (!games || games.length === 0) {
            container.innerHTML = "<p style='font-size:0.8em; color:#999;'>Sprint Roadmap currently active.</p>";
            return;
        }
        
        container.innerHTML = games.map(g => `
            <div style="border-bottom: 1px solid #eee; padding: 10px 0;">
                <div class="match-text" style="font-size: 0.95em;">${g.match}</div>
                <div class="intensity">Intensity: ${g.intensity}</div>
                <div class="status-badge ${getStatusClass(g.status)}">${g.status}</div>
            </div>
        `).join('');
    }

    function renderRoadmap(days) {
        const container = document.getElementById('roadmap-list');
        if (!days) return;

        container.innerHTML = days.map(d => `
            <div class="card">
                <span class="day-label">${d.day} <span style="font-size:0.7em; color:#999; float:right;">${d.date}</span></span>
                ${d.games.map(g => `
                    <div class="game-row">
                        <div class="match-text">${g.match}</div>
                        <div class="intensity">Score: ${g.intensity}</div>
                        <div class="status-badge ${getStatusClass(g.status)}">${g.status}</div>
                        <p style="font-size: 0.75em; color: #666; margin: 5px 0 0 0;">${g.analysis}</p>
                    </div>
                `).join('')}
            </div>
        `).join('');
    }

    fetchData();
    setInterval(fetchData, 300000);
</script>

</body>
</html>

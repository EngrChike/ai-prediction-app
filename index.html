<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI MASTER PREDICT | DonChike</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .intensity-bar { height: 4px; background: #1e293b; border-radius: 2px; overflow: hidden; }
        .intensity-fill { height: 100%; background: linear-gradient(90deg, #22c55e, #3b82f6); transition: width 1s; }
    </style>
</head>
<body class="p-4 md:p-10">
    <header class="max-w-5xl mx-auto mb-10 flex flex-col md:flex-row justify-between items-center gap-4">
        <div>
            <h1 class="text-4xl font-black text-white uppercase">AI MASTER <span class="text-green-500">PREDICT</span></h1>
            <p class="text-gray-500 italic text-sm">Strategic Manual-Scout Engine v3.0</p>
        </div>
        <div id="status" class="bg-green-500/10 border border-green-500/20 px-4 py-2 rounded-full text-xs font-bold text-green-400">
            SYNCING DATA...
        </div>
    </header>

    <main class="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-1 space-y-6">
            <div class="glass p-6 rounded-3xl border-t-4 border-blue-500">
                <h2 class="font-bold mb-4">Morning 5-Odds</h2>
                <div id="morning-odds" class="space-y-3"></div>
            </div>
            <div class="glass p-6 rounded-3xl text-center">
                <p class="text-[10px] text-gray-500 font-bold uppercase">Win Rate</p>
                <p id="winrate" class="text-3xl font-black text-white">91%</p>
            </div>
        </div>

        <div class="lg:col-span-2">
            <section class="glass p-8 rounded-3xl border-t-4 border-green-500 shadow-2xl">
                <h2 class="text-2xl font-bold mb-6 flex items-center"><i class="fa-solid fa-microchip text-green-500 mr-3"></i>10-Day Roadmap</h2>
                <div id="master-list" class="space-y-4"></div>
            </section>
        </div>
    </main>

    <script>
        async function loadData() {
            const b = `?v=${Date.now()}`;
            try {
                const res = await fetch('./tracker.json' + b);
                const data = await res.json();
                const list = document.getElementById('master-list');
                list.innerHTML = data.master_ticket.map(g => `
                    <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                        <div class="flex justify-between items-center mb-2">
                            <div>
                                <p class="text-[10px] text-gray-500 font-black uppercase">${g.day} • ${g.date}</p>
                                <p class="font-bold text-white">${g.match}</p>
                            </div>
                            <span class="text-[10px] text-green-400 font-bold">${g.intensity}</span>
                        </div>
                        <div class="intensity-bar mb-2"><div class="intensity-fill" style="width:${g.intensity}"></div></div>
                        <p class="text-[10px] text-gray-400 italic"><i class="fa-solid fa-check-double mr-1"></i>${g.analysis}</p>
                    </div>
                `).join('');

                const hRes = await fetch('./history.json' + b);
                const hData = await hRes.json();
                document.getElementById('morning-odds').innerHTML = hData.morning_5_odds.map(m => `
                    <div class="bg-white/5 p-3 rounded-xl flex justify-between text-xs">
                        <span>${m.match}</span><span class="text-green-500 font-bold">O 2.5</span>
                    </div>
                `).join('');
                document.getElementById('status').innerText = "LIVE SYNC: " + hData.last_update;
            } catch(e) { console.error(e); }
        }
        window.onload = loadData;
    </script>
</body>
</html>

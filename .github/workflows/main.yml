name: AI Master Predict Engine

on:
  schedule:
    - cron: '0 5 * * *' # Runs daily at 5:00 AM
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run AI Analysis
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: python main.py

      - name: Force Update Site Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage the files updated by main.py
          git add tracker.json history.json
          
          # Commit the changes. If no changes, the script continues.
          git commit -m "AI Intensive Update: $(date)" || echo "No changes detected"
          
          # Force push to ensure the Roadmap stays updated
          git push origin main --force

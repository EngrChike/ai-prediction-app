name: AI Master Predict Engine

on:
  schedule:
    - cron: '0 5 * * *'
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # This gives the bot permission to save files

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          persist-credentials: true
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests

      - name: Run AI Script
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: python main.py

      - name: Force Push Data
        run: |
          git config --global user.name "DonChike-Bot"
          git config --global user.email "actions@github.com"
          git add tracker.json history.json
          # This forces the update even if there's a minor conflict
          git commit -m "AI Update: Real Matches Sync" || exit 0
          git pull --rebase origin main
          git push origin main
